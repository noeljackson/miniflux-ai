apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux-ai
  labels:
    app: miniflux-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniflux-ai
  template:
    metadata:
      labels:
        app: miniflux-ai
    spec:
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: app
          image: REGISTRY_URL/IMAGE_NAME:IMAGE_TAG
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: miniflux-ai-secrets
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
