apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: miniflux-ai-secrets
spec:
  hostAPI: https://infisical.noel.sh/api
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: "miniflux-ai"
        envSlug: "prod"
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: miniflux-ai
  managedSecretReference:
    secretName: miniflux-ai-secrets
    secretNamespace: miniflux-ai
    secretType: Opaque
    creationPolicy: Owner
