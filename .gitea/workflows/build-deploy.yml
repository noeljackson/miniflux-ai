name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE_NAME: noel/miniflux-ai
  DEPLOY_CONTEXT: app
  NAMESPACE: miniflux-ai

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests
        run: go test ./... -v

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ gitea.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ gitea.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ gitea.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Infisical
        id: infisical-auth
        run: |
          RESPONSE=$(curl -s -X POST "${INFISICAL_API_URL}/v1/auth/oidc-auth/login" \
            -H "Content-Type: application/json" \
            -d "{
              \"identityId\": \"${INFISICAL_IDENTITY_ID}\",
              \"jwt\": \"$(cat ${INFISICAL_SA_TOKEN_PATH})\"
            }")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.accessToken')
          if [ "$ACCESS_TOKEN" = "null" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to authenticate to Infisical"
            echo "$RESPONSE"
            exit 1
          fi

          echo "INFISICAL_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Login to Registry
        run: |
          REGISTRY_TOKEN=$(curl -s "${INFISICAL_API_URL}/v3/secrets/raw/GITEA_REGISTRY_TOKEN?workspaceSlug=shared&environment=prod&secretPath=/ci" \
            -H "Authorization: Bearer ${INFISICAL_TOKEN}" | jq -r '.secret.secretValue')
          echo "$REGISTRY_TOKEN" | docker login $REGISTRY -u ci --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and push
        if: gitea.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: gitea.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          TOKEN=$(cat ${K8S_DEPLOY_TOKEN_PATH})
          kubectl config set-cluster $DEPLOY_CONTEXT --server="${K8S_DEPLOY_SERVER}" --insecure-skip-tls-verify=true
          kubectl config set-credentials ci-deployer --token="$TOKEN"
          kubectl config set-context $DEPLOY_CONTEXT --cluster=$DEPLOY_CONTEXT --user=ci-deployer
          kubectl config use-context $DEPLOY_CONTEXT

      - name: Update manifests with image tag
        run: |
          sed -i "s|IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" k8s/*.yaml
          sed -i "s|REGISTRY_URL|$REGISTRY|g" k8s/*.yaml
          sed -i "s|IMAGE_NAME|$IMAGE_NAME|g" k8s/*.yaml

      - name: Deploy to cluster
        run: |
          kubectl --context=$DEPLOY_CONTEXT apply -f k8s/ -n $NAMESPACE
          kubectl --context=$DEPLOY_CONTEXT rollout status deployment/miniflux-ai -n $NAMESPACE --timeout=300s

      - name: Show deployment status
        run: |
          echo "=== Deployment Status ==="
          kubectl --context=$DEPLOY_CONTEXT get pods -n $NAMESPACE
          echo ""
          echo "=== Services ==="
          kubectl --context=$DEPLOY_CONTEXT get svc -n $NAMESPACE
